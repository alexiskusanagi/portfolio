version: '3.8'

services:
  db:
    image: postgres:15
    container_name: ledger_db
    restart: always
    environment:
      POSTGRES_USER: user_ledger
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ledger_financeiro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
